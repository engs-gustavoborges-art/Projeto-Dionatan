<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Tecnica</title>
    <link rel="stylesheet" href="CSS/ftnc.css">
</head>

<body>

<header>
    <img src="Img/logo-transparent.png" alt="Logo site" class="logo">

    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="#">Avaliações</a></li>
            <li><a href="#">Ficha tecnica</a></li>
            <li><a href="#">Curiosidades</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <div class="filtros">
        <input id="busca" type="text" placeholder="Digite o carro aqui..."/>

        <select id="ano">
            <option value="">Todos os anos</option>
            <option value="2010">2010</option>
            <option value="2011">2011</option>
            <option value="2012">2012</option>
            <option value="2013">2013</option>
            <option value="2014">2014</option>
            <option value="2015">2015</option>
            <option value="2016">2016</option>
            <option value="2017">2017</option>
            <option value="2018">2018</option>
            <option value="2019">2019</option>
            <option value="2020">2020</option>
            <option value="2021">2021</option>
            <option value="2022">2022</option>
            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
        </select>

        <select id="combustivel">
            <option value="">Combustivel</option>
            <option value="gasolina">Gasolina</option>
            <option value="flex">Flex</option>
        </select>

        <select id="cambio">
            <option value="">Câmbio</option>
            <option value="automatico">Automático</option>
            <option value="manual">Manual</option>
        </select>

        <button id="btnBuscar">Pesquisar</button>
    </div>

    <div class="lista"></div>
</div>

<!-- JAVASCRIPT -->
<script>
const carros = [
    {nome: "Volkswagen Gol 1.0", ano: "2014", combustivel: "flex", cambio: "manual"},
    {nome: "Fiat Uno 1.0", ano: "2012", combustivel: "gasolina", cambio: "manual"},
    {nome: "Chevrolet Corsa Premium 1.4", ano: "2010", combustivel: "flex", cambio: "manual"},
    {nome: "Volkswagen Jetta GLI 2.0", ano: "2023", combustivel: "gasolina", cambio: "automatico"},
    {nome: "Volkswagen Fox 1.6", ano: "2011", combustivel: "flex", cambio: "manual"},
    {nome: "Volkswagen Polo Sedan 2.0", ano: "2013", combustivel: "flex", cambio: "manual"},  
    {nome: "Peugeot 408 Griffe 1.6 Turbo", ano: "2015", combustivel: "gasolina", cambio: "automatico"},
    {nome: "Chevrolet Cruze Hatch LT 1.8", ano: "2016", combustivel: "flex", cambio: "manual"},  
    {nome: "Jeep Compass 2.0", ano: "2017", combustivel: "flex", cambio: "automatico"},  
    {nome: "Fiat Siena Sublime 1.6", ano: "2018", combustivel: "flex", cambio: "manual"},  
];

const lista = document.querySelector(".lista");

function mostrarCarros(listaCarros){
    lista.innerHTML = "";

    listaCarros.forEach(carro =>{
        lista.innerHTML += `
        <div class="card">
            <div class="imagem"></div>
            <div class="info">
                <h3>${carro.nome}</h3>
                <p>${carro.ano} • ${carro.combustivel} • ${carro.cambio}</p>
            </div>
        </div>
        `;
    });
}

document.getElementById("btnBuscar").addEventListener("click", () => {
    const busca = document.getElementById("busca").value.toLowerCase();
    const ano = document.getElementById("ano").value;
    const combustivel = document.getElementById("combustivel").value;
    const cambio = document.getElementById("cambio").value;

    const filtrados = carros.filter(carro => {
        return (
            carro.nome.toLowerCase().includes(busca) &&
            (ano === "" || carro.ano === ano) &&
            (combustivel === "" || carro.combustivel === combustivel) &&
            (cambio === "" || carro.cambio === cambio)
        );
    });

    mostrarCarros(filtrados);
});

mostrarCarros(carros);
</script>

</body>
</html>
